<!DOCTYPE html>
<html>
<head>
<title>Location Demo</title>

<meta property="og:title" content="Location Demo Project">
<meta property="og:description" content="Click to share your location for demo purpose">
<meta property="og:image" content="https://i.postimg.cc/y8vGyQWF/IMG-6637.jpg">

</head>

<body style="text-align:center;font-family:sans-serif">

<h2>Location Permission Demo</h2>
<p>This demo will request your location with your permission.</p>

<button onclick="getLocation()">Share My Location</button>

<p id="result"></p>

<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition);
  } else {
    document.getElementById("result").innerHTML =
    "Geolocation is not supported by this browser.";
  }
}

function showPosition(position) {
  document.getElementById("result").innerHTML =
  "Latitude: " + position.coords.latitude +
  "<br>Longitude: " + position.coords.longitude;
}
</script>

</body>
</html>
